syntax = "proto3";

package greenhouse;

// ─────────────────────────────────────────────────────────────────────────────
// Greenhouse — "Grow-a-Plant" gRPC contract.
//
// Each caller (logged-in user or anonymous demo) owns up to 3 greenhouse slots.
// A slot is empty or holds one plant. Plant a seed, water it so it keeps growing,
// and harvest it when ripe.
//
// Loaded at runtime by BOTH processes (standalone service + app gRPC client/CLI).
//
//   P1  unary: ListCrops / ListGreenhouses / Plant / Water / Harvest   ✅
//   P3  server streaming: WatchGreenhouses                              ✅
//   P4  client streaming  (future)
//   P5  bidirectional     (future)
// ─────────────────────────────────────────────────────────────────────────────

service Health {
  rpc Check(HealthRequest) returns (HealthReply);
}

message HealthRequest {}

message HealthReply {
  string status = 1; // "SERVING" | "NOT_SERVING"
  bool db_initialized = 2;
  int32 crop_count = 3; // number of crops in the catalog
  string version = 4;
  int64 uptime_ms = 5;
}

service GreenhouseControl {
  // Unary
  rpc ListCrops(Empty) returns (CropList);
  rpc ListGreenhouses(Empty) returns (GreenhouseList);
  rpc Plant(PlantRequest) returns (Greenhouse);
  rpc Water(SlotRequest) returns (Greenhouse);
  rpc Harvest(SlotRequest) returns (HarvestReply);

  // Server streaming — live growth feed for the caller's greenhouses.
  rpc WatchGreenhouses(Empty) returns (stream GreenhouseList);
}

message Empty {}

message Crop {
  string id = 1;
  string name = 2;
  string emoji = 3;
  int32 ripe_ticks = 4; // watered ticks to reach 100%
}

message CropList {
  repeated Crop crops = 1;
}

message Plant {
  string crop = 1; // crop id
  string crop_name = 2;
  string emoji = 3; // ripe-fruit emoji
  int32 growth = 4; // 0..100
  string stage = 5; // seed|sprout|growing|budding|ripe
  int32 water = 6; // 0..100
  bool ripe = 7;
  bool thirsty = 8; // water == 0 → growth stalled
}

message Greenhouse {
  int32 slot = 1; // 1..3
  bool occupied = 2;
  Plant plant = 3; // set when occupied
}

message GreenhouseList {
  repeated Greenhouse greenhouses = 1;
  int32 harvested = 2; // lifetime harvested count for this caller
  int64 tick = 3; // stream tick (0 for unary snapshots)
}

message SlotRequest {
  int32 slot = 1;
}

message PlantRequest {
  int32 slot = 1;
  string crop = 2;
}

message HarvestReply {
  Greenhouse greenhouse = 1; // now-empty slot
  string harvested_crop = 2; // crop id that was harvested
  int32 harvested = 3; // updated lifetime count
}
