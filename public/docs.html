<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/images/logo/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <title>Documentation - Rolnopol</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .docs-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .docs-sidebar {
      position: sticky;
      top: 1rem;
      height: fit-content;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 0.8rem;
      padding: 0.8rem;
      box-shadow: 0 3px 14px rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(8px);
    }

    .docs-sidebar h3 {
      font-size: 0.95rem;
      margin-bottom: 0.75rem;
    }

    .docs-sidebar-toggle-btn {
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      width: 100%;
      margin-bottom: 0.85rem;
      padding: 0.75rem 1rem;
      border: 1px solid rgba(106, 123, 94, 0.22);
      border-radius: 999px;
      background: linear-gradient(135deg, #f4fbf5 0%, #eaf5e8 100%);
      color: #26462d;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(51, 98, 60, 0.12);
      transition:
        background 0.22s ease,
        transform 0.2s ease,
        box-shadow 0.2s ease,
        border-color 0.2s ease;
    }

    .docs-sidebar-toggle-btn:active {
      transform: translateY(0);
      box-shadow: 0 8px 16px rgba(51, 98, 60, 0.14);
    }

    .docs-sidebar-toggle-btn:focus-visible {
      outline: 3px solid rgba(106, 123, 94, 0.28);
      outline-offset: 2px;
    }

    .docs-sidebar-toggle-btn .docs-sidebar-toggle-side {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
    }

    .docs-sidebar-toggle-btn .docs-sidebar-toggle-label {
      display: inline-block;
      min-width: 90px;
    }

    .docs-sidebar-toggle-btn .docs-sidebar-toggle-status {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
    }

    .docs-sidebar-toggle-pill {
      width: 42px;
      height: 22px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(106, 123, 94, 0.25);
      position: relative;
      flex-shrink: 0;
    }

    .docs-sidebar-toggle-circle {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #6a7b5e;
      position: absolute;
      top: 2px;
      left: 2px;
      transition:
        left 0.22s ease,
        background 0.22s ease,
        transform 0.22s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
    }

    .docs-sidebar-toggle-state {
      color: #4a6a42;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .docs-sidebar-toggle-btn.active {
      background: linear-gradient(135deg, #d8f3d7 0%, #b9e4b6 100%);
      border-color: rgba(56, 120, 53, 0.35);
    }

    .docs-sidebar-toggle-btn.active .docs-sidebar-toggle-circle {
      left: calc(100% - 20px);
      background: #2d3a2d;
      transform: scale(1.02);
    }

    .docs-sidebar-toggle-btn.active .docs-sidebar-toggle-state {
      color: #1f3726;
    }

    .docs-sidebar-toggle-btn i {
      font-size: 0.95rem;
      color: #3b593c;
    }

    .docs-hide-flagged [data-feature-flagged="true"] {
      display: none !important;
    }

    .docs-feature-flag-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #4f6446;
      background: linear-gradient(135deg, #eaf6e7 0%, #d8f0d3 100%);
      border: 1px solid rgba(56, 120, 53, 0.28);
      border-radius: 999px;
      padding: 0.15rem 0.5rem;
      white-space: nowrap;
    }

    .docs-feature-flag-badge i {
      font-size: 0.62rem;
    }

    .docs-nav-flag {
      font-size: 0.6rem;
      color: #6a7b5e;
      margin-left: 0.35rem;
      opacity: 0.8;
    }

    /* Callouts (info / tip / warning / success) */
    .docs-callout {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      margin: 1.2rem 0;
      padding: 0.9rem 1.1rem;
      border-radius: 0.7rem;
      border: 1px solid #d4e6cc;
      background: #f4faf1;
    }

    .docs-callout__icon {
      color: #4f6446;
      font-size: 1.1rem;
      margin-top: 0.1rem;
      flex: 0 0 auto;
    }

    .docs-callout__title {
      font-weight: 700;
      color: #2d3a2d;
      margin-bottom: 0.2rem;
    }

    .docs-callout__body {
      line-height: 1.55;
      color: #3d4a3d;
    }

    .docs-callout__body p {
      margin: 0;
    }

    .docs-callout--info {
      border-color: #bcd8ef;
      background: #eef6fc;
    }

    .docs-callout--info .docs-callout__icon {
      color: #2b6cb0;
    }

    .docs-callout--tip {
      border-color: #d4e6cc;
      background: #f1faed;
    }

    .docs-callout--warning {
      border-color: #f0d9a8;
      background: #fdf6e6;
    }

    .docs-callout--warning .docs-callout__icon {
      color: #b7791f;
    }

    .docs-callout--success {
      border-color: #bfe3bd;
      background: #eef8ec;
    }

    .docs-callout--success .docs-callout__icon {
      color: #2f855a;
    }

    /* Scenario steps (numbered walkthrough) */
    .docs-steps {
      margin: 1.3rem 0;
    }

    .docs-steps__title {
      font-weight: 700;
      color: #2d3a2d;
      margin-bottom: 0.6rem;
    }

    .docs-steps__list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .docs-steps__item {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      padding: 0.35rem 0;
    }

    .docs-steps__num {
      flex: 0 0 auto;
      width: 1.65rem;
      height: 1.65rem;
      border-radius: 50%;
      background: #6a7b5e;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 0.1rem;
    }

    .docs-steps__body {
      flex: 1;
      line-height: 1.55;
      color: #3d4a3d;
    }

    .docs-steps__step-title {
      font-weight: 600;
      color: #2d3a2d;
    }

    /* Flow diagram (vertical flowchart) */
    .docs-flow {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 1.5rem 0;
    }

    .docs-flow__title {
      font-weight: 700;
      color: #2d3a2d;
      margin-bottom: 0.8rem;
      align-self: flex-start;
    }

    .docs-flow__node {
      width: 100%;
      max-width: 540px;
      background: linear-gradient(135deg, #f7f9f6 0%, #eaf6e7 100%);
      border: 1.5px solid #cfe3c6;
      border-radius: 0.7rem;
      padding: 0.75rem 1rem;
      text-align: center;
      box-shadow: 0 2px 10px rgba(106, 123, 94, 0.1);
    }

    .docs-flow__node--start {
      border-color: #8bb886;
      background: linear-gradient(135deg, #eaf6e7 0%, #d8f0d3 100%);
    }

    .docs-flow__node--end {
      border-color: #8bb886;
      background: linear-gradient(135deg, #e6f4fb 0%, #dceffa 100%);
    }

    .docs-flow__label {
      font-weight: 600;
      color: #2d3a2d;
    }

    .docs-flow__detail {
      font-size: 0.85rem;
      color: #6a7b5e;
      margin-top: 0.2rem;
    }

    .docs-flow__connector {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.1rem;
      color: #6a7b5e;
      font-size: 0.95rem;
      padding: 0.2rem 0;
    }

    .docs-flow__connector-label {
      font-size: 0.72rem;
      color: #7d8d71;
      font-style: italic;
    }

    .docs-nav a {
      padding: 0.5rem 0.75rem;
      font-size: 0.9rem;
      line-height: 1.3;
    }

    .docs-nav li {
      margin-bottom: 0rem !important;
    }

    .docs-content {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 1rem;
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(10px);
    }

    .docs-nav {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .docs-nav li {
      margin-bottom: 0.5rem;
    }

    .docs-grid {
      width: 100%;
      max-width: 1160px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 250px minmax(0, 1fr);
      gap: 1.2rem;
    }

    .docs-nav a {
      display: block;
      padding: 0.75rem 1rem;
      color: #6a7b5e;
      text-decoration: none;
      border-radius: 0.5rem;
      transition: all 0.3s ease;
      border-left: 3px solid transparent;
    }

    .docs-nav a:hover,
    .docs-nav a.active {
      background: rgba(106, 123, 94, 0.1);
      color: #2d3a2d;
      border-left-color: #6a7b5e;
    }

    .docs-section {
      margin-bottom: 3rem;
      scroll-margin-top: 90px;
      /* Offset for navbar/header */
    }

    .docs-section h2 {
      color: #2d3a2d;
      border-bottom: 2px solid #6a7b5e;
      padding-bottom: 0.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .docs-section h3 {
      color: #6a7b5e;
      margin-top: 2rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      margin: 1.5rem 0;
    }

    .feature-card {
      background: rgba(106, 123, 94, 0.05);
      border: 1px solid rgba(106, 123, 94, 0.1);
      border-radius: 0.8rem;
      padding: 1.5rem;
      transition: all 0.3s ease;
      text-align: left;
    }

    .feature-card-custom {
      text-align: left;
    }

    .feature-card:hover {
      box-shadow: 0 8px 25px rgba(106, 123, 94, 0.15);
    }

    .feature-card h4 {
      color: #2d3a2d;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .role-card {
      background: linear-gradient(135deg, rgba(106, 123, 94, 0.1), rgba(139, 168, 136, 0.1));
      border: 1px solid rgba(106, 123, 94, 0.2);
      border-radius: 1rem;
      padding: 1.5rem;
      margin: 1rem 0;
    }

    .role-card h4 {
      color: #2d3a2d;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .code-block {
      background: #f8f9fa;
      border: 1px solid #e9ecef;
      border-radius: 0.5rem;
      padding: 1rem;
      margin: 1rem 0;
      font-family: "Courier New", monospace;
      font-size: 0.9rem;
      overflow-x: auto;
    }

    .api-endpoint {
      background: rgba(106, 123, 94, 0.05);
      border-left: 4px solid #6a7b5e;
      padding: 1rem;
      margin: 1rem 0;
      border-radius: 0 0.5rem 0.5rem 0;
    }

    .method {
      display: inline-block;
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      font-size: 0.8rem;
      font-weight: bold;
      margin-right: 0.5rem;
    }

    .method.get {
      background: #28a745;
      color: white;
    }

    .method.post {
      background: #007bff;
      color: white;
    }

    .method.put {
      background: #ffc107;
      color: black;
    }

    .method.delete {
      background: #dc3545;
      color: white;
    }

    .demo-accounts {
      background: rgba(106, 123, 94, 0.05);
      border: 1px solid rgba(106, 123, 94, 0.2);
      border-radius: 0.8rem;
      padding: 1.5rem;
      margin: 1.5rem 0;
    }

    .demo-account {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 0.5rem;
      padding: 1rem;
      margin: 0.5rem 0;
    }

    .entity-card {
      background: rgba(106, 123, 94, 0.05);
      border: 1px solid rgba(106, 123, 94, 0.1);
      border-radius: 0.8rem;
      padding: 1.5rem;
      transition: all 0.3s ease;
    }

    .entity-card:hover {
      box-shadow: 0 8px 25px rgba(106, 123, 94, 0.15);
    }

    .entity-card h4 {
      color: #2d3a2d;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .permissions-list {
      margin: 0.5rem 0 0 1.2rem;
      text-align: left;
      padding-left: 1.2rem;
    }

    @media (max-width: 768px) {
      .docs-sidebar {
        position: static;
        margin-bottom: 1rem;
      }

      .feature-grid {
        grid-template-columns: 1fr;
      }
    }

    /* New classes extracted from inline styles */
    .docs-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: visible;
      padding: 1.2rem 0 1.2rem 0;
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
      border-radius: 1.2rem 1.2rem 0 0;
    }

    .docs-ai-widget {
      position: fixed;
      top: calc(var(--navbar-height, 4rem) + 1rem);
      right: max(1rem, calc((100vw - 1200px) / 2 + 1rem));
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.75rem;
      z-index: 950;
    }

    .docs-ai-widget[hidden] {
      display: none !important;
    }

    .docs-ai-widget__toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      border: 1px solid rgba(106, 123, 94, 0.24);
      border-radius: 999px;
      background: linear-gradient(135deg, #fffef6 0%, #eef8eb 100%);
      color: #26462d;
      box-shadow: 0 14px 30px rgba(51, 98, 60, 0.18);
      padding: 0.7rem 1rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }

    .docs-ai-widget__toggle:focus-visible,
    .docs-ai-widget__close:focus-visible,
    .docs-ai-widget__send:focus-visible,
    .docs-ai-widget__input:focus-visible {
      outline: 3px solid rgba(106, 123, 94, 0.24);
      outline-offset: 2px;
    }

    .docs-ai-widget__panel {
      width: min(360px, calc(100vw - 2rem));
      background: rgba(255, 255, 255, 0.97);
      border: 1px solid rgba(106, 123, 94, 0.18);
      border-radius: 1rem;
      box-shadow: 0 24px 50px rgba(34, 51, 39, 0.22);
      backdrop-filter: blur(12px);
      overflow: hidden;
    }

    .docs-ai-widget__header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.95rem 1rem 0.75rem;
      border-bottom: 1px solid rgba(106, 123, 94, 0.12);
      background: linear-gradient(135deg, rgba(244, 251, 245, 0.95) 0%, rgba(235, 245, 233, 0.96) 100%);
    }

    .docs-ai-widget__title {
      color: #2d3a2d;
      font-size: 1rem;
      font-weight: 700;
    }

    .docs-ai-widget__status {
      color: #6a7b5e;
      font-size: 0.8rem;
      margin-top: 0.2rem;
    }

    .docs-ai-widget__thinking {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      margin-top: 0.35rem;
      color: #4f6446;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .docs-ai-widget__thinking[hidden] {
      display: none;
    }

    .docs-ai-widget__spinner {
      width: 0.85rem;
      height: 0.85rem;
      border-radius: 999px;
      border: 2px solid rgba(106, 123, 94, 0.2);
      border-top-color: #4f6446;
      animation: docs-ai-spin 0.8s linear infinite;
      flex: 0 0 auto;
    }

    @keyframes docs-ai-spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .docs-ai-widget__close {
      border: none;
      background: transparent;
      color: #466046;
      cursor: pointer;
      font-size: 1rem;
    }

    .docs-ai-widget__messages {
      max-height: 240px;
      overflow-y: auto;
      padding: 0.9rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      background: rgba(249, 251, 248, 0.95);
    }

    .docs-ai-widget__message {
      display: flex;
    }

    .docs-ai-widget__message--assistant {
      justify-content: flex-start;
    }

    .docs-ai-widget__message--user {
      justify-content: flex-end;
    }

    .docs-ai-widget__bubble {
      max-width: 88%;
      border-radius: 0.95rem;
      padding: 0.7rem 0.85rem;
      font-size: 0.88rem;
      line-height: 1.45;
      box-shadow: 0 8px 18px rgba(34, 51, 39, 0.08);
    }

    .docs-ai-widget__message--assistant .docs-ai-widget__bubble {
      background: white;
      color: #2d3a2d;
      border: 1px solid rgba(106, 123, 94, 0.12);
    }

    .docs-ai-widget__message--user .docs-ai-widget__bubble {
      background: linear-gradient(135deg, #dff1d8 0%, #cde7c6 100%);
      color: #1f3726;
    }

    .docs-ai-widget__form {
      display: flex;
      gap: 0.6rem;
      padding: 0.85rem 1rem 1rem;
      border-top: 1px solid rgba(106, 123, 94, 0.12);
      background: rgba(255, 255, 255, 0.96);
    }

    .docs-ai-widget__input {
      flex: 1;
      border: 1px solid rgba(106, 123, 94, 0.18);
      border-radius: 0.8rem;
      padding: 0.7rem 0.85rem;
      font-size: 0.9rem;
      background: rgba(255, 255, 255, 0.94);
      color: #2d3a2d;
    }

    .docs-ai-widget__send {
      border: none;
      border-radius: 0.8rem;
      padding: 0.7rem 0.9rem;
      background: linear-gradient(135deg, #6a7b5e 0%, #4f6446 100%);
      color: white;
      cursor: pointer;
      font-weight: 600;
    }

    .docs-ai-widget__send:disabled,
    .docs-ai-widget__input:disabled {
      cursor: wait;
      opacity: 0.72;
    }

    .docs-header-row {
      display: flex;
      align-items: center;
      gap: 1.1rem;
      width: 100%;
      justify-content: center;
    }

    .docs-header-title {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 2rem;
    }

    .docs-search {
      display: none;
      margin-bottom: 1rem;
    }

    .docs-search-label {
      display: block;
      font-size: 0.85rem;
      color: #6a7b5e;
      margin-bottom: 0.4rem;
    }

    .docs-search-input {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.7rem;
      border: 1px solid rgba(106, 123, 94, 0.2);
      border-radius: 0.6rem;
      background: rgba(255, 255, 255, 0.9);
    }

    .docs-search-input input {
      border: none;
      outline: none;
      width: 100%;
      background: transparent;
      font-size: 0.9rem;
      color: #2d3a2d;
    }

    .docs-search-empty {
      margin-top: 0.6rem;
      font-size: 0.85rem;
      color: #8b9299;
      display: none;
    }

    .docs-search-advanced {
      display: none;
      margin-top: 0.8rem;
      padding-top: 0.8rem;
      border-top: 1px solid rgba(106, 123, 94, 0.1);
    }

    .docs-search-advanced.active {
      display: block;
    }

    .docs-search-filters {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .docs-search-filter-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .docs-search-filter-label {
      font-size: 0.8rem;
      color: #6a7b5e;
      font-weight: 500;
    }

    .docs-search-filter-options {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .docs-search-filter-option {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.3rem 0.6rem;
      border: 1px solid rgba(106, 123, 94, 0.2);
      border-radius: 0.4rem;
      background: rgba(255, 255, 255, 0.9);
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s ease;
    }

    .docs-search-filter-option:hover {
      border-color: rgba(106, 123, 94, 0.4);
      background: rgba(106, 123, 94, 0.05);
    }

    .docs-search-filter-option input[type="checkbox"] {
      margin: 0;
      cursor: pointer;
    }

    .docs-search-mode-toggle {
      display: flex;
      gap: 0.3rem;
      border: 1px solid rgba(106, 123, 94, 0.2);
      border-radius: 0.4rem;
      padding: 0.2rem;
      background: rgba(255, 255, 255, 0.9);
    }

    .docs-search-mode-btn {
      padding: 0.3rem 0.6rem;
      border: none;
      background: transparent;
      color: #6a7b5e;
      cursor: pointer;
      font-size: 0.8rem;
      border-radius: 0.3rem;
      transition: all 0.2s ease;
    }

    .docs-search-mode-btn.active {
      background: rgba(106, 123, 94, 0.2);
      color: #2d3a2d;
      font-weight: 500;
    }

    .docs-header-title-col {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .docs-header-subtitle {
      font-size: 1.08rem;
      color: #6a7b5e;
      font-weight: 400;
      margin-top: 0.1rem;
    }

    .docs-section-divider {
      margin: 2.5rem 0 2rem 0;
      border: none;
      border-top: 1.5px solid #e0e0e0;
    }

    .entity-card-custom {
      box-shadow: 0 2px 12px rgba(106, 123, 94, 0.08);
      background: #f7f9f6;
      border: 1.5px solid #e0e0e0;
      padding: 1.2rem 1rem;
      border-radius: 0.7rem;
    }

    .entity-card-title {
      color: #2d3a2d;
      margin-bottom: 0.7rem;
    }

    .demo-account-custom {
      box-shadow: 0 2px 12px rgba(106, 123, 94, 0.08);
      border: 1.5px solid #e0e0e0;
      background: #f9fafb;
      padding: 1.2rem 1rem;
      border-radius: 0.7rem;
      margin: 0.5rem 0;
    }

    .demo-account-title {
      color: #2d3a2d;
      margin-bottom: 0.7rem;
    }

    .role-card-custom {
      box-shadow: 0 2px 12px rgba(106, 123, 94, 0.08);
      background: #f7f9f6;
      border: 1.5px solid #e0e0e0;
      padding: 1.2rem 1rem;
      border-radius: 0.7rem;
    }

    .role-card-title {
      color: #2d3a2d;
      margin-bottom: 0.7rem;
    }

    .feature-card-custom {
      background: linear-gradient(135deg, #eaf6e7 0%, #f7f9f6 100%);
      border: 1.5px solid #e0e0e0;
      border-radius: 0.7rem;
      padding: 1.2rem 1rem;
    }

    .feature-card-title {
      color: #6a7b5e;
      margin-bottom: 0.7rem;
    }

    .types-card-custom {
      box-shadow: 0 2px 12px rgba(106, 123, 94, 0.08);
      background: #f7f9f6;
      border: 1.5px solid #e0e0e0;
      padding: 1.2rem 1rem;
      border-radius: 0.7rem;
    }

    .types-card-title {
      color: #2d3a2d;
      margin-bottom: 0.7rem;
    }

    .json-fallback {
      background: #f8f9fa;
      border: 1px solid #e9ecef;
      border-radius: 0.5rem;
      padding: 1rem;
      margin: 1rem 0;
    }

    .section-icons {
      color: #6a7b5e;
    }

    .main-title {
      /* keep as is, or move from inline if present */
    }

    /* --- Enhanced Documentation Data Styles --- */
    .docs-content table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin: 1.5rem 0;
      background: #f8faf7;
      border-radius: 0.7rem;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(106, 123, 94, 0.06);
    }

    .docs-content th,
    .docs-content td {
      border: 1px solid #e0e0e0;
      padding: 0.7rem 1rem;
      text-align: left;
    }

    .docs-content th {
      background: #eaf6e7;
      color: #2d3a2d;
      font-weight: 600;
      font-size: 1.05rem;
    }

    .docs-content tr:nth-child(even) td {
      background: #f3f6f2;
    }

    .docs-content tr:nth-child(odd) td {
      background: #f8faf7;
    }

    .docs-content table {
      margin-bottom: 2rem;
    }

    .docs-content ul,
    .docs-content ol {
      margin: 1rem 0 1.5rem 2rem;
      font-size: 1.08rem;
      color: #3d4a3d;
    }

    .docs-content li {
      margin-bottom: 0.4rem;
      line-height: 1.7;
    }

    .docs-content h3 {
      color: #4a6a3d;
      font-size: 1.25rem;
      margin-top: 2.2rem;
      margin-bottom: 1rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      border-left: 4px solid #b7d7b0;
      padding-left: 0.7rem;
      background: linear-gradient(90deg, #f7f9f6 80%, #eaf6e7 100%);
      border-radius: 0.3rem;
    }

    .docs-content p {
      font-size: 1.08rem;
      color: #3d4a3d;
      margin-bottom: 1.1rem;
      margin-top: 0.2rem;
      line-height: 1.7;
    }

    /* Fancy subsection card styles */
    .subsection-card {
      background: linear-gradient(135deg, #f7f9f6 0%, #eaf6e7 100%);
      border: 2px solid #d4e6cc;
      border-radius: 1rem;
      padding: 1.5rem;
      margin: 1.5rem 0;
      box-shadow: 0 4px 20px rgba(106, 123, 94, 0.12);
      transition: all 0.3s ease;
    }

    .subsection-card:hover {
      box-shadow: 0 8px 30px rgba(106, 123, 94, 0.18);
      border-color: #6a7b5e;
    }

    .subsection-card-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .subsection-card-icon {
      font-size: 1.8rem;
      color: #6a7b5e;
      width: 3rem;
      height: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(106, 123, 94, 0.1);
      border-radius: 0.7rem;
    }

    .subsection-card-title-group h4 {
      color: #2d3a2d;
      font-size: 1.3rem;
      margin: 0 0 0.3rem 0;
      font-weight: 700;
    }

    .subsection-card-description {
      color: #6a7b5e;
      font-size: 0.95rem;
      font-style: italic;
      margin: 0;
    }

    .subsection-card-content {
      margin-top: 1.2rem;
    }

    .subsection-card-content ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .subsection-card-content li {
      padding: 0rem 0;
      padding-left: 0;
      color: #3d4a3d;
      font-size: 1.02rem;
      line-height: 1.6;
      border-bottom: 1px dotted rgba(106, 123, 94, 0.15);
    }

    .subsection-card-content li:last-child {
      border-bottom: none;
    }

    .subsection-card-content li:before {
      content: "▸ ";
      color: #6a7b5e;
      font-weight: bold;
      margin-right: 0.5rem;
    }

    @media (max-width: 768px) {
      .docs-ai-widget {
        position: static;
        width: 100%;
        margin-top: 1rem;
        align-items: stretch;
      }

      .docs-ai-widget__toggle,
      .docs-ai-widget__panel {
        width: 100%;
      }
    }
  </style>
</head>

<body class="bg-agri-pattern">
  <!-- Dynamic Header Component -->
  <div id="header-component" data-testid="header-component"></div>

  <div id="docs-ai-widget" class="docs-ai-widget" hidden>
    <button type="button" id="docs-ai-toggle" class="docs-ai-widget__toggle" aria-expanded="false" aria-controls="docs-ai-panel">
      <i class="fas fa-feather-pointed" aria-hidden="true"></i>
      <span>Ask Docsy</span>
    </button>
    <section id="docs-ai-panel" class="docs-ai-widget__panel" hidden aria-hidden="true">
      <div class="docs-ai-widget__header">
        <div>
          <div id="docs-ai-title" class="docs-ai-widget__title">✨ Docsy</div>
          <div id="docs-ai-status" class="docs-ai-widget__status">Answers grounded in Rolnopol docs</div>
          <div id="docs-ai-thinking" class="docs-ai-widget__thinking" hidden aria-live="polite">
            <span class="docs-ai-widget__spinner" aria-hidden="true"></span>
            <span>Docsy is thinking…</span>
          </div>
        </div>
        <button type="button" id="docs-ai-close" class="docs-ai-widget__close" aria-label="Close documentation assistant">
          <i class="fas fa-times" aria-hidden="true"></i>
        </button>
      </div>
      <div id="docs-ai-messages" class="docs-ai-widget__messages" aria-live="polite"></div>
      <form id="docs-ai-form" class="docs-ai-widget__form">
        <input id="docs-ai-input" class="docs-ai-widget__input" type="text" maxlength="1024" placeholder="Ask about docs, API, roles, or features" autocomplete="off" required />
        <button id="docs-ai-send" class="docs-ai-widget__send" type="submit">Send</button>
      </form>
    </section>
  </div>

  <div class="container" style="margin-top: 1rem" data-testid="main-container">
    <header class="header glass docs-header" data-testid="docs-header">
      <div class="docs-header-row" data-testid="docs-header-row">
        <h1 class="docs-header-title" data-testid="docs-header-title">
          <span class="bg-agri-gradient"><i class="fas fa-book"></i></span>
        </h1>
        <div class="docs-header-title-col" data-testid="docs-header-title-col">
          <span class="main-title">Documentation</span>
          <span class="docs-header-subtitle">Rolnopol System Guide & API Reference</span>
        </div>
      </div>
    </header>

    <div class="docs-container" data-testid="docs-container">
      <div class="docs-grid" data-testid="docs-grid">
        <!-- Sidebar Navigation -->
        <div class="docs-sidebar" data-testid="docs-sidebar">
          <h3 style="color: #2d3a2d; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem" data-testid="docs-sidebar-title">
            <i class="fas fa-list"></i> Contents
          </h3>
          <button type="button" class="docs-sidebar-toggle-btn" id="docs-sidebar-toggle" data-testid="docs-sidebar-toggle" aria-pressed="true" style="display: none">
            <span class="docs-sidebar-toggle-side">
              <span class="docs-sidebar-toggle-label">Hide feature-flagged docs</span>
            </span>
            <span class="docs-sidebar-toggle-status">
              <span class="docs-sidebar-toggle-pill" aria-hidden="true">
                <span class="docs-sidebar-toggle-circle"></span>
              </span>
            </span>
          </button>
          <div class="docs-search" id="docs-search">
            <label class="docs-search-label" for="docs-search-input">Search</label>
            <div class="docs-search-input">
              <i class="fas fa-magnifying-glass"></i>
              <input id="docs-search-input" type="search" placeholder="Search documentation" autocomplete="off" />
            </div>
            <div class="docs-search-empty" id="docs-search-empty">No matching sections.</div>

            <!-- Advanced Search UI (hidden by default) -->
            <div class="docs-search-advanced" id="docs-search-advanced">
              <div class="docs-search-filters">
                <!-- Search Mode -->
                <div class="docs-search-filter-group">
                  <span class="docs-search-filter-label">Match Mode</span>
                  <div class="docs-search-mode-toggle" id="docs-search-mode">
                    <button class="docs-search-mode-btn active" data-mode="contains">Contains</button>
                    <button class="docs-search-mode-btn" data-mode="exact">Exact</button>
                    <button class="docs-search-mode-btn" data-mode="regex">Regex</button>
                  </div>
                </div>

                <!-- Search Scope -->
                <div class="docs-search-filter-group">
                  <span class="docs-search-filter-label">Search In</span>
                  <div class="docs-search-filter-options" id="docs-search-scope">
                    <label class="docs-search-filter-option">
                      <input type="checkbox" value="title" checked />
                      Titles
                    </label>
                    <label class="docs-search-filter-option">
                      <input type="checkbox" value="content" checked />
                      Content
                    </label>
                  </div>
                </div>

                <!-- Case Sensitivity -->
                <div class="docs-search-filter-group">
                  <label class="docs-search-filter-option">
                    <input type="checkbox" id="docs-search-case-sensitive" />
                    Case Sensitive
                  </label>
                </div>
              </div>
            </div>
          </div>
          <ul class="docs-nav" id="dynamic-docs-nav" data-testid="docs-nav">
            <!-- Navigation will be built dynamically -->
          </ul>
        </div>

        <!-- Main Content -->
        <div class="docs-content" data-testid="docs-content">
          <div id="dynamic-docs-content" data-testid="dynamic-docs-content">
            <p>Loading documentation...</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Dynamic Footer Component -->
    <div id="footer-component" data-testid="footer-component"></div>
  </div>

  <!-- Core Dependencies -->
  <script src="/js/core/event-bus.js"></script>
  <script src="/js/core/storage.js"></script>
  <script src="/js/core/app.js"></script>

  <!-- Services -->
  <script src="/js/services/api-service.js"></script>
  <script src="/js/services/auth-service.js"></script>
  <script src="/js/services/feature-flags-service.js"></script>

  <!-- Components -->
  <script src="/js/components/notification.js"></script>
  <script src="/js/components/navigation.js"></script>
  <script src="/js/components/form.js"></script>
  <script src="/js/components.js"></script>

  <!-- API Functions -->
  <script src="/js/api.js"></script>

  <!-- Utilities -->
  <script src="/js/utils/error-logger.js"></script>
  <script src="/js/utils/utils.js"></script>
  <script src="/js/utils/router.js"></script>
  <script src="/js/utils/global-compat.js"></script>
  <script src="/js/pages/docs-ai-widget.js"></script>

  <!-- Main Application -->
  <script src="/js/app.js"></script>
  <script src="/js/utils/init-navigation.js"></script>
  <script src="/js/pages/docs-page.js"></script>
</body>

</html>
